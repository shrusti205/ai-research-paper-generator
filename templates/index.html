<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Research Paper Generator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

  <div class="container">
    <header>
      <h1>AI Research Paper <span>Generator</span></h1>
      <div class="subtitle">Upload a research paper PDF and get AI insights.</div>
    </header>

    <main class="panel">
      <form method="POST" enctype="multipart/form-data">
        <div class="upload-container">
          <div class="dropzone">
            <!-- Custom SVG File Icon -->
            <svg class="upload-icon" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round" />
              <polyline points="14 2 14 8 20 8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              <line x1="16" y1="13" x2="8" y2="13" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              <line x1="16" y1="17" x2="8" y2="17" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              <polyline points="10 9 9 9 8 9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <div class="upload-text">Choose or drag a research paper PDF</div>
            <div class="upload-hint">Only PDF files up to 10MB are supported</div>
            <input type="file" id="pdf-input" name="pdf" accept=".pdf" required>
          </div>
          <div id="file-name-preview" class="file-name-preview"></div>
        </div>

        <button type="submit" class="btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          Analyze Document
        </button>
      </form>
    </main>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
